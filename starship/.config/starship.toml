"$schema" = 'https://starship.rs/config-schema.json'

# https://starship.rs/presets/tokyo-night

#[‚ĖĎ‚Ėí‚Ėď](fg:#a3aed2 bg:#1d2230)\
#[ÓÉó](fg:#a3aed2 bg:#394260)\

