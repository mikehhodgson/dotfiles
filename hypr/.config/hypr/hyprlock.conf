source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    #blur_passes = 3
    blur_passes = 0
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    #outline_thickness = 4
    outline_thickness = 1

    #font_family = Hack Nerd Font Mono
    font_family = Nasalization
    font_color = $font_color

    #placeholder_text = Enter Password
    placeholder_text = ENTER PASSWORD
    check_color = $check_color
    #fail_text = <i>$FAIL ($ATTEMPTS)</i>
    #fail_text = $FAIL ($ATTEMPTS)
    fail_text = AUTHENTICATION FAILED ($ATTEMPTS)
    fail_color = rgba(228, 0, 43, 1.0)

    #rounding = 0
    rounding = 10
    #shadow_passes = 0
    shadow_passes = 3
    shadow_boost = 2
    shadow_size = 4
    fade_on_empty = false

    #dots_text_format = █
    dots_rounding = 8
    dots_spacing = 0.5
}

auth {
    fingerprint:enabled = false
}
